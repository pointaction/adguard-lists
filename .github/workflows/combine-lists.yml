name: Combine lists

# Builds the curated one-URL feeds by fetching the sources listed in
#   build/combine-blocklist-sources.txt  ->  pasblock-completeblocklist.txt
#   build/combine-whitelist-sources.txt  ->  pasallow-completewhitelist.txt
# Each source is fetched directly, cleaned, de-duplicated and merged into a
# single file. A source that fails to fetch is skipped, never failing the run.
# Runs daily (after the per-source syncs) and can be run manually.

on:
  push:
    paths:
      - "build/combine-blocklist-sources.txt"
      - "build/combine-whitelist-sources.txt"
      - "scripts/build_combined.py"
  schedule:
    - cron: "30 0/6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  combine:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build allow-domain set (for blocklist subtraction)
        run: |
          set -euo pipefail
          grep -hE '^@@\|\|' *.txt 2>/dev/null \
            | sed -E 's/^@@\|\|//; s/\^.*$//' | sort -u > allow_domains.txt || true
          echo "allow-listed domains: $(wc -l < allow_domains.txt)"

      - name: Fetch and build combined blocklist
        run: |
          set -euo pipefail
          mkdir -p _rawb
          if [ -f build/combine-blocklist-sources.txt ]; then
            while read -r name url _rest; do
              case "$name" in ''|\#*) continue ;; esac
              [ -z "${url:-}" ] && continue
              if curl -fsSL --retry 3 --max-time 60 "$url" -o "_rawb/$name.txt"; then
                echo "  fetched $name ($(wc -l < "_rawb/$name.txt") lines)"
              else
                echo "  fetch failed — skipping $name"; rm -f "_rawb/$name.txt"
              fi
            done < <(sed 's/\r$//' build/combine-blocklist-sources.txt)
          fi
          python3 scripts/build_combined.py --kind block \
            --sources build/combine-blocklist-sources.txt --rawdir _rawb \
            --allow allow_domains.txt --out pasblock-completeblocklist.txt \
            --title "Point Action Complete Blocklist"
          rm -rf _rawb

      - name: Fetch and build combined whitelist
        run: |
          set -euo pipefail
          mkdir -p _raww
          if [ -f build/combine-whitelist-sources.txt ]; then
            while read -r name url _rest; do
              case "$name" in ''|\#*) continue ;; esac
              [ -z "${url:-}" ] && continue
              if curl -fsSL --retry 3 --max-time 60 "$url" -o "_raww/$name.txt"; then
                echo "  fetched $name ($(wc -l < "_raww/$name.txt") lines)"
              else
                echo "  fetch failed — skipping $name"; rm -f "_raww/$name.txt"
              fi
            done < <(sed 's/\r$//' build/combine-whitelist-sources.txt)
          fi
          python3 scripts/build_combined.py --kind allow \
            --sources build/combine-whitelist-sources.txt --rawdir _raww \
            --out pasallow-completewhitelist.txt \
            --title "Point Action Complete Whitelist"
          rm -rf _raww allow_domains.txt

      - name: Commit combined feeds
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          changed=0
          for f in pasblock-completeblocklist.txt pasallow-completewhitelist.txt; do
            [ -e "$f" ] || continue
            if ! git diff -G'^(\|\||@@)' --quiet -- "$f"; then
              git add "$f"; changed=1
            fi
          done
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            git add "$f"; changed=1
          done < <(git ls-files --others --exclude-standard \
                     'pasblock-completeblocklist.txt' 'pasallow-completewhitelist.txt')
          if [ "$changed" -eq 1 ]; then
            git commit -m "Rebuild combined feeds ($(date -u +%F))"
            git push
          else
            echo "No rule changes; combined feeds unchanged."
          fi
