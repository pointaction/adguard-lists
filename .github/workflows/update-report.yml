name: Update report

# After the sync workflows commit changed lists, this regenerates the stats
# table in README.md and appends a dated added/removed entry to CHANGELOG.md.
# It only touches README.md / CHANGELOG.md, so it does not re-trigger itself.

on:
  push:
    paths:
      - "pas*.txt"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need the parent commit to diff against

      - name: Update README stats table
        run: python3 scripts/stats.py

      - name: Update CHANGELOG
        run: |
          set -euo pipefail
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            git diff --unified=0 HEAD~1 HEAD -- 'pas*.txt' | python3 scripts/changelog.py
          else
            echo "No parent commit yet; skipping changelog."
          fi

      - name: Commit report changes
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md CHANGELOG.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to update."
          else
            git commit -m "Update stats & changelog ($(date -u +%F))"
            git push
          fi
