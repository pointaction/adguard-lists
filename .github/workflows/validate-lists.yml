name: Validate AdGuard lists

# Validates the hand-maintained lists (paswhitelist.txt, pasblacklist.txt,
# false-positive-fixes.txt). The synced upstream lists are already cleaned by
# the build scripts, so they are intentionally not checked here.
on:
  push:
    paths:
      - "paswhitelist.txt"
      - "pasblacklist.txt"
      - "false-positive-fixes.txt"
      - "scripts/validate_lists.py"
      - ".github/workflows/validate-lists.yml"
  pull_request:
    paths:
      - "paswhitelist.txt"
      - "pasblacklist.txt"
      - "false-positive-fixes.txt"
      - "scripts/validate_lists.py"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # No setup-python needed: ubuntu-latest already ships Python 3.
      - name: Validate hand-maintained lists
        run: python3 scripts/validate_lists.py paswhitelist.txt pasblacklist.txt false-positive-fixes.txt
