name: Validate AdGuard lists

# Validates ONLY the personal, hand-maintained lists (paswhitelist.txt and
# pasblacklist.txt). The synced pas*-*.txt lists come from upstream and are
# already cleaned by the build scripts, so they are intentionally not checked
# here — that keeps validation focused on the files you actually edit.
on:
  push:
    paths:
      - "paswhitelist.txt"
      - "pasblacklist.txt"
      - "pas-shipping-carrier-whitelist.txt"
      - "pasfalse-positive-fixes.txt"
      - "scripts/validate_lists.py"
      - ".github/workflows/validate-lists.yml"
  pull_request:
    paths:
      - "paswhitelist.txt"
      - "pasblacklist.txt"
      - "pas-shipping-carrier-whitelist.txt"
      - "pasfalse-positive-fixes.txt"
      - "scripts/validate_lists.py"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # No setup-python needed: ubuntu-latest already ships Python 3.
      - name: Validate personal lists
        # Only your two hand-maintained files. Checks syntax + duplicates.
        run: python3 scripts/validate_lists.py paswhitelist.txt pasblacklist.txt pas-shipping-carrier-whitelist.txt false-positive-fixes.txt
