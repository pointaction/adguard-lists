name: Build DNS lists

# PLACEMENT: this file goes at  .github/workflows/build-lists.yml  in your repo.
#
# Runs the fork build: merges your rules over HaGeZi PRO and commits
# pasblacklist.built.txt so AdGuard Home can subscribe to it.

on:
  schedule:
    - cron: "0 11 * * 1"        # every Monday 11:00 UTC (weekly refresh)
  workflow_dispatch:            # lets you run it by hand from the Actions tab
  push:
    branches: [ main ]
    paths:                      # rebuild whenever you edit your source lists
      - "pasblacklist.txt"
      - "paswhitelist.txt"
      - "build_lists.py"

permissions:
  contents: write               # needed so the job can commit the built file

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build merged blocklist
        run: python3 build_lists.py --tier pro

      - name: Commit if changed
        run: |
          git config user.name  "list-bot"
          git config user.email "list-bot@users.noreply.github.com"
          git add pasblacklist.built.txt
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Rebuild lists ($(date -u +%Y-%m-%d))"
            git push
          fi
